<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!--
    Evolve logo: A single continuous stroke forming a spiral
    that loops back into itself — self-improvement as a symbol.
    Minimal, monochrome, geometric.
  -->
  <rect width="512" height="512" rx="108" fill="#0A0A0A"/>
  <g transform="translate(256,256)">
    <!-- Outer arc: open circle with a gap -->
    <path
      d="M 0,-120 A 120,120 0 1,1 -84,-84"
      fill="none"
      stroke="white"
      stroke-width="28"
      stroke-linecap="round"
    />
    <!-- Inner spiral arm curving inward from the gap -->
    <path
      d="M -84,-84 C -40,-40 -60,10 -10,10 C 40,10 50,-40 20,-65"
      fill="none"
      stroke="white"
      stroke-width="28"
      stroke-linecap="round"
    />
  </g>
</svg>
